name: Build Desktop (Linux, Windows, macOS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact_name: sweetspot-linux
            artifact_path: build/linux/x64/release/bundle/**
          - name: Windows
            os: windows-latest
            target: windows
            artifact_name: sweetspot-windows
            artifact_path: build/windows/x64/runner/Release/**
          - name: macOS
            os: macos-latest
            target: macos
            artifact_name: sweetspot-macos
            artifact_path: build/macos/Build/Products/Release/*.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build release
        run: flutter build ${{ matrix.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

