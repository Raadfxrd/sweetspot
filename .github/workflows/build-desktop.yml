name: Build Desktop (Linux, Windows, macOS)

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    if: github.event.pull_request.head.ref == 'development'
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact_name: sweetspot-linux
            archive_name: sweetspot-linux.tar.gz
          - name: Windows
            os: windows-latest
            target: windows
            artifact_name: sweetspot-windows
            archive_name: sweetspot-windows.zip
          - name: macOS
            os: macos-latest
            target: macos
            artifact_name: sweetspot-macos
            archive_name: sweetspot-macos.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build release
        run: flutter build ${{ matrix.target }} --release

      - name: Archive build (Linux)
        if: runner.os == 'Linux'
        run: |
          cd build/linux/x64/release
          tar -czf ../../../../${{ matrix.archive_name }} bundle/

      - name: Archive build (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build/windows/x64/runner
          7z a ..\..\..\..\${{ matrix.archive_name }} Release/

      - name: Archive build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../${{ matrix.archive_name }} *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error
